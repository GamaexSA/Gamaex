[build]
builder = "NIXPACKS"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @gamaex/database db:generate && pnpm --filter @gamaex/database run build && pnpm --filter @gamaex/api run build"

[deploy]
startCommand = "node apps/api/dist/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
