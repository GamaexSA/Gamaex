services:
  - type: web
    name: gamaex-api
    runtime: node
    region: oregon
    plan: free

    rootDir: .
    buildCommand: bash build.sh
    startCommand: node apps/api/dist/main

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
