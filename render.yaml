services:
  - type: web
    name: gamaex-api
    runtime: node
    nodeVersion: 20.19.1
    region: oregon
    plan: free

    rootDir: .
    buildCommand: >
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @gamaex/types build &&
      pnpm --filter @gamaex/database db:generate &&
      pnpm --filter @gamaex/api build
    startCommand: node apps/api/dist/main

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
